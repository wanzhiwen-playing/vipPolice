# GitHub Actions 工作流：自动编译 iOS App
name: Build iOS App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    name: Build and Export IPA
    runs-on: macos-latest  # 使用 GitHub 提供的 macOS 环境
    
    steps:
    # 1. 检出代码
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    # 2. 设置 Xcode 版本
    - name: Select Xcode Version
      run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer
    
    # 3. 显示 Xcode 信息
    - name: Show Xcode Version
      run: xcodebuild -version
    
    # 4. 创建 Xcode 项目
    - name: Create Xcode Project
      run: |
        # 创建项目目录结构
        mkdir -p vipPolice.xcodeproj
        
        # 生成 project.pbxproj 文件
        cat > vipPolice.xcodeproj/project.pbxproj << 'EOF'
        // !$*UTF8*$!
        {
          archiveVersion = 1;
          classes = {
          };
          objectVersion = 56;
          objects = {
            /* 项目配置 */
            BuildConfiguration = {
              isa = XCBuildConfiguration;
              buildSettings = {
                PRODUCT_NAME = vipPolice;
                PRODUCT_BUNDLE_IDENTIFIER = com.vippolice.app;
                SWIFT_VERSION = 5.0;
                TARGETED_DEVICE_FAMILY = "1";
                IPHONEOS_DEPLOYMENT_TARGET = 17.0;
                CODE_SIGN_IDENTITY = "-";
                CODE_SIGN_STYLE = Automatic;
              };
            };
          };
          rootObject = ProjectRef;
        }
        EOF
    
    # 5. 安装依赖（如果需要）
    - name: Install Dependencies
      run: |
        # 如果使用 CocoaPods
        # pod install
        echo "No dependencies to install"
    
    # 6. 构建项目
    - name: Build Project
      run: |
        xcodebuild clean build \
          -scheme vipPolice \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
    
    # 7. 创建 IPA
    - name: Create IPA
      run: |
        # 创建 Payload 目录
        mkdir -p Payload
        
        # 复制 .app 到 Payload
        cp -r build/Release-iphoneos/vipPolice.app Payload/
        
        # 打包成 IPA
        zip -r vipPolice.ipa Payload
        
        # 清理
        rm -rf Payload
    
    # 8. 上传 IPA 作为 Artifact
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: vipPolice-IPA
        path: vipPolice.ipa
        retention-days: 30
    
    # 9. 创建 Release（可选）
    - name: Create Release
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        files: vipPolice.ipa
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
