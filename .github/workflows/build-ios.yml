# GitHub Actions 工作流：自动编译 iOS App
name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install XcodeGen
      run: brew install xcodegen
    
    - name: Generate Xcode Project
      run: xcodegen generate
    
    - name: List Schemes
      run: xcodebuild -list -project vipPolice.xcodeproj
    
    - name: Build App
      run: |
        xcodebuild -project vipPolice.xcodeproj \
          -scheme vipPolice \
          -configuration Release \
          -archivePath build/vipPolice.xcarchive \
          archive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          ENABLE_PREVIEWS=NO
    
    - name: Export IPA
      run: |
        mkdir Payload
        cp -r build/vipPolice.xcarchive/Products/Applications/vipPolice.app Payload/
        zip -r vipPolice.ipa Payload
        ls -lh vipPolice.ipa
    
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: vipPolice-IPA
        path: vipPolice.ipa
        retention-days: 30
    
    - name: Create Release
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        files: vipPolice.ipa
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
