name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # 使用 macos-14 以支持 iOS 17/18 开发
    runs-on: macos-14
    
    # 添加发布所需权限
    permissions:
      contents: write
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    # 动态选择最新的稳定版 Xcode，避免路径硬编码错误
    - name: Select Xcode Version
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest-stable'
    
    - name: Install XcodeGen
      run: brew install xcodegen
    
    - name: Generate Xcode Project
      # 这一步会根据你的 project.yml 生成 .xcodeproj
      run: xcodegen generate
    
    - name: Build and Archive
      run: |
        xcodebuild archive \
          -project vipPolice.xcodeproj \
          -scheme vipPolice \
          -configuration Release \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          -archivePath build/vipPolice.xcarchive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          ENABLE_PREVIEWS=NO \
          COMPILER_INDEX_STORE_ENABLE=NO
    
    - name: Create Payload Structure
      # 由于没有证书，我们需要非常标准地创建 Payload 结构，并将它打成正确的 zip (ipa) 格式
      run: |
        mkdir -p Payload
        cp -R build/vipPolice.xcarchive/Products/Applications/vipPolice.app Payload/
        
        # 移除所有可能导致 Sideloadly 无法读取的隐藏系统文件
        find Payload -name ".DS_Store" -type f -delete
        
        # 使用原生 codesign 进行简单伪签（确保所有文件被递归签名）
        codesign --force --deep --sign - Payload/vipPolice.app
        
        # 使用 Apple 官方的 ditto 命令进行归档，确保不会包含 __MACOSX 这种导致 Sideloadly 解析失败的拓展属性文件夹
        ditto -c -k --keepParent Payload vipPolice.ipa
        echo "IPA generated successfully."
        ls -lh vipPolice.ipa
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vipPolice-IPA
        path: vipPolice.ipa
        retention-days: 7

    - name: Create GitHub Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Build v1.0.${{ github.run_number }}
        files: vipPolice.ipa
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}