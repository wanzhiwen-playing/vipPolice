# GitHub Actions 工作流：自动编译 iOS App
name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install XcodeGen
      run: brew install xcodegen
    
    - name: Generate Xcode Project
      run: xcodegen generate
    
    - name: Build App
      run: |
        xcodebuild -project vipPolice.xcodeproj \
          -scheme vipPolice \
          -configuration Release \
          -archivePath build/vipPolice.xcarchive \
          archive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO
    
    - name: Export IPA
      run: |
        mkdir Payload
        cp -r build/vipPolice.xcarchive/Products/Applications/vipPolice.app Payload/
        zip -r vipPolice.ipa Payload
    
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: vipPolice-IPA
        path: vipPolice.ipa
