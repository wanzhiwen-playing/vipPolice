name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # 使用 macos-14 以支持 iOS 17/18 开发
    runs-on: macos-14
    
    # 添加发布所需权限
    permissions:
      contents: write
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    # 动态选择最新的稳定版 Xcode，避免路径硬编码错误
    - name: Select Xcode Version
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest-stable'
    
    - name: Install XcodeGen
      run: brew install xcodegen
    
    - name: Generate Xcode Project
      # 这一步会根据你的 project.yml 生成 .xcodeproj
      run: xcodegen generate
    
    - name: Build and Archive
      run: |
        xcodebuild archive \
          -project vipPolice.xcodeproj \
          -scheme vipPolice \
          -configuration Release \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          -archivePath build/vipPolice.xcarchive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          ENABLE_PREVIEWS=NO \
          COMPILER_INDEX_STORE_ENABLE=NO
    
    - name: Export IPA (Manual Payload)
      # 由于没有证书，我们手动创建符合 iOS 安装规范的 Payload 目录，并进行简单的 ldid 签名以满足部分工具验证
      run: |
        brew install ldid
        mkdir -p Payload
        cp -r build/vipPolice.xcarchive/Products/Applications/*.app Payload/
        
        # 伪签名以满足 Sideloadly 格式要求
        ldid -S Payload/*.app
        
        zip -r vipPolice.ipa Payload
        echo "IPA generated successfully."
        ls -lh vipPolice.ipa
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vipPolice-IPA
        path: vipPolice.ipa
        retention-days: 7

    - name: Create GitHub Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Build v1.0.${{ github.run_number }}
        files: vipPolice.ipa
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}