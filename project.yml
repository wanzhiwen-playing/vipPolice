# XcodeGen 项目配置文件
name: vipPolice

options:
  bundleIdPrefix: com.vippolice
  deploymentTarget:
    iOS: 17.0

targets:
  vipPolice:
    type: application
    platform: iOS
    
    sources:
      - Models
      - Views
      - Services
      - ContentView.swift
      - vipPoliceApp.swift
    
    info:
      path: Info.plist
    
    settings:
      base:
        PRODUCT_NAME: vipPolice
        PRODUCT_BUNDLE_IDENTIFIER: com.vippolice.app
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: 17.0
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        ENABLE_PREVIEWS: NO
        SWIFT_OPTIMIZATION_LEVEL: "-O"
        SWIFT_COMPILATION_MODE: wholemodule
