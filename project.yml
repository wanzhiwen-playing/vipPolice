# XcodeGen 项目配置文件
# 用于自动生成 Xcode 项目

name: vipPolice

options:
  bundleIdPrefix: com.vippolice
  deploymentTarget:
    iOS: 17.0
  
settings:
  base:
    PRODUCT_NAME: vipPolice
    SWIFT_VERSION: 5.9
    TARGETED_DEVICE_FAMILY: 1
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  vipPolice:
    type: application
    platform: iOS
    
    sources:
      - path: .
        excludes:
          - "*.md"
          - ".github"
          - ".git"
    
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.vippolice.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: 1
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
    
    dependencies: []
    
    scheme:
      testTargets: []
      gatherCoverageData: false
